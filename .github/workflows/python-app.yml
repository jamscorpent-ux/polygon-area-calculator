name: Jalankan Ujian Python Menggunakan Docker

on: push

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Ambil Kod Kalkulator
      uses: actions/checkout@v4

    - name: Bina Bekas Docker (Build Docker Image)
      run: docker build -t kalkulator-app .

    - name: Jalankan Ujian Dalam Docker (Run Docker Container)
      run: docker run kalkulator-app
